<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gregorian to Hijri Converter</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #333;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
        }
        input[type="date"] {
            padding: 10px;
            width: calc(100% - 22px);
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: #ff69b4;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #ff1493;
        }
        .result {
            margin-top: 20px;
            color: #333;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gregorian to Hijri Converter</h1>
        <label for="gregorian-date">Select Gregorian Date:</label>
        <input type="date" id="gregorian-date">
        <button onclick="convertDate()">Convert to Hijri</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        function convertDate() {
            const gregorianDate = document.getElementById('gregorian-date').value;
            if (!gregorianDate) {
                document.getElementById('result').innerText = 'Please select a date.';
                return;
            }

            // Conversion logic here
            const date = new Date(gregorianDate);
            const hijriDate = new Intl.DateTimeFormat('en-TN-u-ca-islamic', {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            }).format(date);

            document.getElementById('result').innerText = `Hijri Date: ${hijriDate}`;
        }
    </script>
</body>
</html>
