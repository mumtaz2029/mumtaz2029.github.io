<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gregorian to Hijri Converter</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: calc(100% - 24px);
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #ff69b4;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ff85c0;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gregorian to Hijri Converter</h1>
        <input type="date" id="gregorianDate">
        <button onclick="convertToHijri()">Convert</button>
        <div class="result" id="result"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hijri-date/1.0.3/hijri-date.min.js"></script>
    <script>
        function convertToHijri() {
            const gregorianDateInput = document.getElementById('gregorianDate').value;
            if (!gregorianDateInput) {
                alert('Please select a Gregorian date.');
                return;
            }

            const gregorianDate = new Date(gregorianDateInput);
            const hijriDate = new HijriDate(gregorianDate);
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = `Hijri Date: ${hijriDate.format('YYYY/MM/DD')}`;
        }
    </script>
</body>
</html>
